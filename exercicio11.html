<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 11</title>
    <script src="js/exercicio11.js" defer></script>
</head>
<body>
    <h1>Exercício 11</h1>
    <label for="faltas">Número de faltas:</label>
    <input type="number" id="faltas" />
    <button id="verificar">Verificar Situação</button>
    <p id="resultado"></p>

    <script>
        document.getElementById('verificar').addEventListener('click', function() {
            const faltas = parseInt(document.getElementById('faltas').value);
            const resultado = document.getElementById('resultado');

            if (faltas > 15) {
                resultado.textContent = "Reprovado por falta.";
            } else {
                resultado.textContent = "Aprovado.";
            }
        });
    </script>
</body>
</html>
