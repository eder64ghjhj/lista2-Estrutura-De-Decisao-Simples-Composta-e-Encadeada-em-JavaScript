<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 16</title>
    <script src="js/exercicio16.js" defer></script>
</head>
<body>
    <h1>Exercício 16</h1>
    <label for="quantidadeMacas">Quantidade de maçãs compradas:</label>
    <input type="number" id="quantidadeMacas" min="0">
    <button id="calcular">Calcular Valor Total</button>
    <p id="resultado"></p>

    <script>
        document.getElementById('calcular').addEventListener('click', function() {
            const quantidade = parseInt(document.getElementById('quantidadeMacas').value);
            let precoPorMaca;

            if (quantidade < 12) {
                precoPorMaca = 0.50;
            } else {
                precoPorMaca = 0.40;
            }

            const total = quantidade * precoPorMaca;
            document.getElementById('resultado').innerText = `Valor total a ser pago: R$ ${total.toFixed(2)}`;
        });
    </script>
</body>
</html>
